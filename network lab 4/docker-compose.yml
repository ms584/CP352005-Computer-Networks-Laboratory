services:
  r1:
    image: alpine
    container_name: R1
    privileged: true
    networks:
      public_net:
        ipv4_address: 10.10.12.1
      lan_a_net:
        ipv4_address: 192.168.10.1
    command: >
      sh -c "
      apk add --no-cache iproute2 iptables &&
      sysctl -w net.ipv4.ip_forward=1 &&
      ip route replace 192.168.20.0/24 via 10.10.12.2 &&
      tail -f /dev/null
      "

  r2:
    image: alpine
    container_name: R2
    privileged: true
    networks:
      public_net:
        ipv4_address: 10.10.12.2
      lan_b_net:
        ipv4_address: 192.168.20.1
    command: >
      sh -c "
      apk add --no-cache iproute2 iptables &&
      sysctl -w net.ipv4.ip_forward=1 &&
      sysctl -w net.ipv4.conf.all.rp_filter=0 &&
      sysctl -w net.ipv4.conf.default.rp_filter=0 &&
      sysctl -w net.ipv4.conf.eth0.rp_filter=0 &&
      sysctl -w net.ipv4.conf.eth1.rp_filter=0 &&

      ip route replace 192.168.10.0/24 via 10.10.12.1 &&

      iptables -F &&
      iptables -t nat -F &&

      iptables -P FORWARD ACCEPT &&

      iptables -t nat -A PREROUTING -i eth1 -p tcp --dport 3000 -j DNAT --to-destination 192.168.20.10:3000 &&
      iptables -t nat -A PREROUTING -i eth1 -p tcp --dport 3001 -j DNAT --to-destination 192.168.20.10:3001 &&

      iptables -t nat -A POSTROUTING -o eth0 -p tcp -d 192.168.20.10 --dport 3000 -j MASQUERADE &&
      iptables -t nat -A POSTROUTING -o eth0 -p tcp -d 192.168.20.10 --dport 3001 -j MASQUERADE &&

      iptables -A FORWARD -i eth1 -o eth0 -p tcp -d 192.168.20.10 --dport 3000 -m conntrack --ctstate NEW,ESTABLISHED,RELATED -j ACCEPT &&
      iptables -A FORWARD -i eth1 -o eth0 -p tcp -d 192.168.20.10 --dport 3001 -m conntrack --ctstate NEW,ESTABLISHED,RELATED -j ACCEPT &&
      iptables -A FORWARD -i eth0 -o eth1 -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT &&

      tail -f /dev/null
      "

  server_a:
    build: ./automation
    container_name: ServerA
    privileged: true
    volumes:
      - ./automation:/automation
    networks:
      lan_a_net:
        ipv4_address: 192.168.10.10
    command: >
      sh -c "
      ip route del default || true &&
      ip route add default via 192.168.10.1 &&
      python /automation/start_services.py
      "

  server_b:
    build: ./automation
    container_name: ServerB
    privileged: true
    volumes:
      - ./automation:/automation
    networks:
      lan_b_net:
        ipv4_address: 192.168.20.10
    command: >
      sh -c "
      ip route del default || true &&
      ip route add default via 192.168.20.1 &&
      python /automation/start_services.py
      "

  client_a:
    build: ./automation
    container_name: ClientA
    privileged: true
    networks:
      lan_a_net:
        ipv4_address: 192.168.10.50
    command: >
      sh -c "
      ip route del default || true &&
      ip route add default via 192.168.10.1 &&
      tail -f /dev/null
      "

  client_b:
    build: ./automation
    container_name: ClientB
    privileged: true
    networks:
      lan_b_net:
        ipv4_address: 192.168.20.50
    command: >
      sh -c "
      ip route del default || true &&
      ip route add default via 192.168.20.1 &&
      tail -f /dev/null
      "

networks:
  public_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.12.0/29
          gateway: 10.10.12.6

  lan_a_net:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.10.0/24
          gateway: 192.168.10.254

  lan_b_net:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.20.0/24
          gateway: 192.168.20.254